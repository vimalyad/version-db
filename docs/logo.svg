<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="VersionDB logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b54e6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d4e0f3"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#glow)"/>

  <!-- Soft shadow under the database -->
  <ellipse cx="200" cy="346" rx="92" ry="16" fill="#0b1020" opacity="0.18"/>

  <!-- Faint links: each database layer <-> its version node -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.32">
    <line x1="288" y1="232" x2="356" y2="232"/>
    <line x1="288" y1="271" x2="356" y2="271"/>
    <line x1="288" y1="310" x2="356" y2="310"/>
  </g>

  <!-- Database cylinder (the store) -->
  <g>
    <path d="M114,212 V330 A86,26 0 0 1 286,330 V212 Z" fill="url(#cyl)"/>
    <ellipse cx="200" cy="212" rx="86" ry="26" fill="#ffffff" stroke="#c0d0e8" stroke-width="3"/>
    <!-- version-band rings -->
    <path d="M114,251 A86,26 0 0 1 286,251" fill="none" stroke="#9fb3d1" stroke-width="4" stroke-linecap="round"/>
    <path d="M114,290 A86,26 0 0 1 286,290" fill="none" stroke="#9fb3d1" stroke-width="4" stroke-linecap="round"/>
    <!-- outline -->
    <path d="M114,212 V330 A86,26 0 0 1 286,330 V212" fill="none" stroke="#c0d0e8" stroke-width="3"/>
  </g>

  <!-- Version chain (MVCC versions) -->
  <g>
    <line x1="372" y1="232" x2="372" y2="310" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    <circle cx="372" cy="310" r="16" fill="#e6edf8" stroke="#4338ca" stroke-width="3"/>
    <circle cx="372" cy="271" r="16" fill="#e6edf8" stroke="#4338ca" stroke-width="3"/>
    <!-- HEAD / newest version -->
    <circle cx="372" cy="232" r="18" fill="#f59e0b" stroke="#b45309" stroke-width="3"/>
  </g>
</svg>
